spring.application.name=car_stereo_wiki
spring.devtools.livereload.enabled=true

# DATABASE
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/car_stereo_wiki}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# GITHUB OAUTH
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}

# EBAY API
ebay.api.currency=CAD
ebay.api.client-id=${EBAY_CLIENT_ID:YOUR_EBAY_CLIENT_ID}
ebay.api.client-secret=${EBAY_CLIENT_SECRET:YOUR_EBAY_CLIENT_SECRET}
pricing.service.logging.enabled=${PRICING_LOGGING_ENABLED:true}

# CHIBISAFE API
chibisafe.api.url=${CHIBISAFE_API_URL:https://chibisafe.moe}
chibisafe.api.key=${CHIBISAFE_API_KEY:YOUR_CHIBISAFE_API_KEY}

# FILE UPLOAD
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB