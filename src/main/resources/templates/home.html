<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car Stereo Wiki</title>
</head>
<body>
<h1>Welcome to Car Stereo Wiki</h1>

<div th:if="${carStereos != null and !carStereos.isEmpty()}">
    <div th:each="carStereo : ${carStereos}">
        <h2 th:text="${carStereo.name}">Car Stereo Name</h2>
        <p>
            Year: <span th:text="${carStereo.year}">2024</span>
        </p>
        <p th:if="${carStereo.size != null}">
            Size: <span th:text="${carStereo.size.name}">Single DIN</span>
        </p>
        <p th:if="${carStereo.brands != null}">
            Brands:
            <span th:each="brand, iterStat : ${carStereo.brands}">
                <span th:text="${brand.name}">Brand</span><span th:if="${!iterStat.last}">, </span>
            </span>
        </p>
        <hr>
    </div>
</div>

<p th:if="${carStereos == null or carStereos.isEmpty()}">
    No car stereos found.
</p>
</body>
</html>
