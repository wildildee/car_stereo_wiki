<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template :: head('Error - Car Stereo Wiki', null, null)}">
    <title>Error - Car Stereo Wiki</title>
</head>
<body>
<header th:replace="~{template :: header}"></header>
<section class="section">
    <div class="container">
        <div class="notification is-danger">
            <h1 class="title">Something went wrong!</h1>
            <p th:text="${'An error occurred: ' + (error != null ? error : 'Unknown error')}">An error occurred.</p>
            <p th:if="${status != null}" th:text="${'Status code: ' + status}">Status: 500</p>
            <p th:if="${message != null}" th:text="${'Message: ' + message}">Message</p>
            <br>
            <a href="/" class="button is-light">Go back home</a>
        </div>
    </div>
</section>
<footer th:replace="~{template :: footer}"></footer>
</body>
</html>
