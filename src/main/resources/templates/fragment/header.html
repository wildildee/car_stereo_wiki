<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
  <!--/*@thymesVar id="pageHeader" type="java.lang.String"*/-->
  <nav class="navbar is-dark" role="navigation" aria-label="main navigation" th:fragment="header(pageHeader)">
      <div class="navbar-brand">
          <a class="navbar-item" href="/">
              <strong th:text="${pageHeader}">Car Stereo Wiki</strong>
          </a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">
          <div class="navbar-start">
              <div class="navbar-item">
                  <form action="/search" method="get">
                      <div class="field has-addons">
                          <div class="control">
                              <input class="input" type="text" name="query" placeholder="Search by name..." th:value="${query}">
                          </div>
                          <div class="control">
                              <button type="submit" class="button is-info">
                                  Search
                              </button>
                          </div>
                      </div>
                  </form>
              </div>
          </div>
          <div class="navbar-end">
              <div class="navbar-item">
                  <div class="header-buttons loggedout">
                      <a class="button is-light" href="/oauth2/authorization/github">
                          Log in
                      </a>
                  </div>
                  <div class="header-buttons loggedin">
                      <a class="button is-light">
                          <span id="username"></span>
                      </a>
                      <a class="button is-danger" id="logout">
                          Log Out
                      </a>
                  </div>
              </div>
          </div>
      </div>
  </nav>
</body>
</html>
