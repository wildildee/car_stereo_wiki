<!-- templates/fragment/tagBox.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<!--/*@thymesVar id="tag" type="dev.wildilde.car_stereo_wiki.entity.Tag"*/-->
    <div th:fragment="tagBox(tags)"
     class="tagHolder">
        <a th:each="tag : ${tags}" class="tag" th:data-tag="${tag.name}" th:href="@{/search(${tag.type}=${tag.name})}" th:text="${tag.name}"></a>
    </div>
</body>
</html>
