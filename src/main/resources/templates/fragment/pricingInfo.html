<!-- templates/fragment/pricingInfo.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
    <!--/*@thymesVar id="info" type="dev.wildilde.car_stereo_wiki.entity.PricingInfo"*/-->
    <div th:fragment="pricingInfo(info)" class="block priceHolder">
        <h4 class="is-size-6" th:text="${#strings.capitalize(info.website)} + ' (Last updated: ' + ${#temporals.format(info.lastUpdated, 'yyyy-MM-dd')} + ')'"></h4>
        <div class="grid is-col-min-3" th:if="${info.prices != null && !info.prices.isEmpty()}">
            <a class="cell priceBlock" th:each="priceItem : ${info.prices}" th:href="${priceItem.link}" target="_blank">
                <figure class="image is-square" th:if="${priceItem.image != null}">
                    <img th:src="${priceItem.image}" alt="Item image">
                </figure>
                <p class="is-size-7" th:text="'$' + ${#numbers.formatDecimal(priceItem.price, 1, 2)} + ' ' + ${@environment.getProperty('ebay.api.currency')}"></p>
            </a>
            <!-- Add empty cells to fill the first row of grid -->
            <div class="cell" th:if="${info.prices.size() < 5}"></div>
            <div class="cell" th:if="${info.prices.size() < 4}"></div>
            <div class="cell" th:if="${info.prices.size() < 3}"></div>
            <div class="cell" th:if="${info.prices.size() < 2}"></div>
        </div>
        <p th:unless="${info.prices != null && !info.prices.isEmpty()}">No recent sales found.</p>
    </div>
</body>
</html>
