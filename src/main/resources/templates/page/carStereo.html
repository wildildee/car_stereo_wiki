<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template :: head(
    pageTitle=${carStereo.name} + ' - Car Stereo Wiki', 
    description=${#strings.listJoin(carStereo.getAllTagNames(), ' | ')},
    image=${(carStereo.galleryImages != null && !carStereo.galleryImages.isEmpty()) ? carStereo.galleryImages[0].imageURL : null}
)}">
    <title th:text="${carStereo.name} + ' - Car Stereo Wiki'">Car Stereo Details</title>
</head>
<link rel="stylesheet" href="/css/gallery.css">
<script src="/js/gallery.js"></script>
<body>
    <header th:replace="~{template :: header}"></header>
    <section class="section">
        <div class="container">
            <div class="columns">
                <!-- Side column -->
                <div class="column is-one-third is-flex" th:if="${carStereo.galleryImages != null && !carStereo.galleryImages.isEmpty()}">
                    <div class="box is-flex-grow-1">
                        <!-- Gallery -->
                        <div th:replace="~{fragment/gallery :: gallery(${carStereo.galleryImages}, ${carStereo.name})}"></div>

                        <!-- Pricing Info -->
                        <div class="content block" th:if="${carStereo.pricingInfos != null && !carStereo.pricingInfos.isEmpty()}">
                            <h3 class="is-size-5">Pricing Info</h3>
                            <div th:each="info : ${carStereo.pricingInfos}" class="block">
                                <div th:replace="~{fragment/pricingInfo :: pricingInfo(${info})}"></div>
                            </div>
                        </div>

                        <!-- Resources -->
                        <div class="content block" th:if="${carStereo.resources != null && !carStereo.resources.isEmpty()}">
                            <h3 class="is-size-5">Resources</h3>
                            <div th:each="resource : ${carStereo.resources}">
                                <a th:href="${resource.link}" target="_blank">
                                    <span class="icon"><i th:class="${resource.getIcon()}"></i></span>
                                    <span th:text="${resource.name}"></span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Details column -->
                <div class="column is-flex">
                    <div class="box is-flex-grow-1">
                        <div class="is-flex is-justify-content-space-between is-align-items-center">
                            <h1 class="title" th:text="${carStereo.name}"></h1>
                            <a class="button is-small is-link" th:href="@{/carStereo/{name}/edit(name=${carStereo.name})}" th:if="${isAdmin}">Edit</a>
                        </div>
                        <h2 class="subtitle" th:text="'Year: ' + ${carStereo.year}"></h2>

                        <table class="table is-fullwidth">
                            <thead>
                                <tr>
                                    <th>Brand</th>
                                    <th>Size</th>
                                    <th>Display</th>
                                    <th>Inputs</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><div th:replace="~{fragment/tagBox :: tagBox(${carStereo.brands})}"></div></td>
                                    <td><div th:replace="~{fragment/tagBox :: tagBox(${carStereo.sizes})}"></div></td>
                                    <td><div th:replace="~{fragment/tagBox :: tagBox(${carStereo.displays})}"></div></td>
                                    <td><div th:replace="~{fragment/tagBox :: tagBox(${carStereo.inputs})}"></div></td>
                                </tr>
                            </tbody>
                        </table>

                        <div class="content">
                            <h3 class="is-size-5">Description</h3>
                            <p style="white-space: pre-wrap;" th:text="${carStereo.description}"></p>
                        </div>

                        <hr>

                        <!-- Comments Section -->
                        <div class="content">
                            <h3 class="is-size-5">Comments & Suggestions</h3>
                            <p class="is-size-7 has-text-grey">Comments are only visible to you and administrators for review.</p>

                            <!-- Display existing comments -->
                            <div th:if="${not #lists.isEmpty(comments)}">
                                <div th:each="comment : ${comments}" class="box mb-3">
                                    <div class="is-flex is-justify-content-space-between">
                                        <div class="is-flex is-align-items-center">
                                            <h4 class="mb-0 mr-3" th:text="${comment.user.name}"></h4>
                                            <form th:if="${isAdmin || (isUserLoggedIn && comment.user.id == currentUser)}"
                                                  th:action="@{/comment/{id}/delete(id=${comment.id})}" method="post" class="is-inline">
                                                <button type="submit" class="button is-danger is-small is-outlined" 
                                                        onclick="return confirm('Are you sure you want to delete this comment?')">Delete</button>
                                            </form>
                                        </div>
                                        <span class="is-size-7" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    </div>
                                    <p class="mt-2" th:text="${comment.text}"></p>
                                    <div th:if="${not #lists.isEmpty(comment.photoUrls)}" class="mt-2 is-flex is-flex-wrap-wrap" style="gap: 0.5rem;">
                                        <figure th:each="photoUrl : ${comment.photoUrls}" class="image is-128x128">
                                            <a th:href="${photoUrl}" target="_blank">
                                                <img th:src="${photoUrl}" alt="Comment photo" style="object-fit: cover; height: 100%;">
                                            </a>
                                        </figure>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${#lists.isEmpty(comments) && isUserLoggedIn}" class="has-text-grey is-italic">
                                <p>No comments yet.</p>
                            </div>

                            <!-- Comment form -->
                            <div th:if="${isUserLoggedIn}" class="mt-5">
                                <h4 class="is-size-6 has-text-weight-semibold">Leave a comment or suggestion</h4>
                                <form th:action="@{/carStereo/{id}/comment(id=${carStereo.id})}" method="post" enctype="multipart/form-data">
                                    <input type="hidden" name="id" th:value="${carStereo.id}">
                                    <div class="field">
                                        <label class="control">
                                            <textarea class="textarea" name="text" placeholder="Your suggestion or comment..." required maxlength="2000"></textarea>
                                        </label>
                                    </div>
                                    <div class="field">
                                        <label class="label is-size-7">Upload photos (optional, multiple allowed)</label>
                                        <div class="file has-name is-small is-fullwidth">
                                            <label class="file-label">
                                                <input class="file-input" type="file" name="photo" accept="image/*" multiple
                                                       onchange="const nameSpan = this.parentElement.querySelector('.file-name'); 
                                                                 nameSpan.textContent = this.files.length > 0 ? this.files.length + ' file(s) selected' : 'No file selected'">
                                                <span class="file-cta">
                                                    <span class="file-icon"><i class="fas fa-upload"></i></span>
                                                    <span class="file-label">Choose files…</span>
                                                </span>
                                                <span class="file-name">No file selected</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="control">
                                        <button type="submit" class="button is-primary is-small">Submit</button>
                                    </div>
                                </form>
                            </div>
                            <div th:unless="${isUserLoggedIn}" class="mt-5 notification">
                                <p>Please <a th:href="@{/oauth2/authorization/github}">login</a> to leave a comment or suggestion.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer th:replace="~{template :: footer}"></footer>
</body>
</html>
